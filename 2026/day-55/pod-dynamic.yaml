apiVersion: v1
kind: Pod
metadata:
  name: pod-dynamic
spec:
  containers:
    - name: writer
      image: busybox:latest
      command:
        [
          "sh",
          "-c",
          'echo "Hello, this was written from pod-dynamic to dynamic-pvc at $(date)" >> /data/message.txt && sleep 3600',
        ]
      volumeMounts:
        - name: dynamic-storage
          mountPath: /data
  volumes:
    - name: dynamic-storage
      persistentVolumeClaim:
        claimName: dynamic-pvc

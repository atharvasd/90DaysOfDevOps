# pod-secret.yaml
apiVersion: v1
kind: Pod
metadata:
  name: pod-secret
spec:
  containers:
    - name: app-container
      image: busybox:latest
      command:
        [
          "sh",
          "-c",
          'echo "DB_USER Env Var: $DB_USER" && echo "--- Volume Mount Files: ---" && cat /etc/db-credentials/DB_USER && echo "" && cat /etc/db-credentials/DB_PASSWORD && echo "" && sleep 3600',
        ]
      env:
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: DB_USER
      volumeMounts:
        - name: secret-volume
          mountPath: /etc/db-credentials
          readOnly: true
  volumes:
    - name: secret-volume
      secret:
        secretName: db-credentials
